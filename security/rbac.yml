apiVersion: v1
kind: ServiceAccount
metadata:
  name: todoapp-secrets-reader
  namespace: todoapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todoapp-secrets-reader
  namespace: todoapp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todoapp-secrets-reader
  namespace: todoapp
subjects:
  - kind: ServiceAccount
    name: todoapp-secrets-reader
    namespace: todoapp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: todoapp-secrets-reader
